<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}fogpub{% endblock %}</title>
    <link href="https://fonts.bunny.net/css2?family=Playfair+Display:wght@400;500;600&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8f5;
            --bg-warm: #f5f0e8;
            --text: #2c2420;
            --muted: #6b5d54;
            --accent: #c4754e;
            --accent-hover: #a8623d;
            --nav: #2c2420;
            --card: #fff;
            --border: #e8e0d5;
            --display: 'Playfair Display', Georgia, serif;
            --body: 'Source Sans 3', system-ui, sans-serif;
        }

        body {
            margin: 0;
            font: 1.05rem/1.7 var(--body);
            color: var(--text);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: var(--nav);
            padding: 0 2rem;
        }

        nav .nav-content {
            max-width: 720px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        nav .brand {
            color: var(--bg);
            font: 500 1.4rem var(--display);
            letter-spacing: -0.01em;
        }
        nav .brand:hover { opacity: 0.85; text-decoration: none; }

        nav .nav-links {
            display: flex;
            gap: 1.75rem;
            align-items: center;
        }

        nav .nav-links a, nav button {
            color: #b8a99a;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            font-family: inherit;
        }

        nav .nav-links a:hover, nav button:hover { color: var(--bg); }

        main {
            flex: 1;
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
        }

        h1 {
            font-family: var(--display);
            font-weight: 500;
            line-height: 1.3;
            font-size: 2.6rem;
            margin: 1rem 0;
        }

        h2 {
            font-family: var(--display);
            font-weight: 500;
            line-height: 1.3;
            margin: 0 0 1rem;
            font-size: 1.9rem;
        }

        h3 {
            font-family: var(--display);
            font-weight: 500;
            line-height: 1.3;
            margin: 0 0 1rem;
            font-size: 1.3rem;
            margin-bottom: 0.75rem;
        }


        p {
            margin: 0 0 1.25rem;
            color: var(--muted);
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        button, .button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.85rem 2rem;
            font: inherit;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            text-decoration: none;
            display: inline-block;
        }

        button:hover, .button:hover {
            background: var(--accent-hover);
            color: #fff;
            text-decoration: none;
        }

        form { max-width: 420px; }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.85rem;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font: inherit;
            margin-bottom: 1.25rem;
            background: var(--card);
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .error {
            background: #fdf2f0;
            color: #b91c1c;
            padding: 0.85rem 1.25rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
            border-left: 3px solid #b91c1c;
        }

        /* Landing page */
        .hero { padding: 3rem 0 2rem; }
        .hero h1 { font-size: 3rem; letter-spacing: -0.02em; }

        .hero-subtitle {
            font-size: 1.25rem;
            color: var(--muted);
            max-width: 540px;
            line-height: 1.6;
        }

        .section-alt {
            background: var(--bg-warm);
            padding: 2.5rem 2rem;
        }

        .use-cases {
            display: grid;
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .use-case {
            background: var(--card);
            padding: 1.75rem;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .use-case p {
            margin: 0;
            font-style: italic;
        }

        .cta-section {
            text-align: center;
            padding: 3rem 0;
        }

        .cta-section .button {
            font-size: 1.15rem;
            padding: 1rem 2.5rem;
        }

        .divider {
            width: 120px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <a href="/" class="brand">fogpub</a>
            <div class="nav-links">
                {% block nav %}
                {% if logged_in %}
                    {% if let Some(email) = email %}
                        <a href="/profile">{{ email }}</a>
                    {% endif %}
                    <form method="post" action="/logout" style="display: inline;">
                        <button type="submit">Log out</button>
                    </form>
                {% else %}
                    <a href="/login">Sign in</a>
                {% endif %}
                {% endblock %}
            </div>
        </div>
    </nav>
    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
