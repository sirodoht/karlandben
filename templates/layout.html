<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}fogpub{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            line-height: 1.5;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #1a1a1a;
            padding: 0 2rem;
        }

        nav .nav-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }

        nav .brand {
            color: #fff;
            font-size: 1.25rem;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        nav .brand:hover {
            opacity: 0.8;
            text-decoration: none;
        }

        nav .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav .nav-links a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        nav .nav-links a:hover {
            color: #fff;
        }

        nav button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
            transition: color 0.2s;
        }

        nav button:hover {
            color: #fff;
        }

        main {
            flex: 1;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            margin-bottom: 1rem;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        button, .button {
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            text-decoration: none;
            display: inline-block;
        }

        button:hover, .button:hover {
            background: #333;
            text-decoration: none;
        }

        form {
            max-width: 400px;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            margin-bottom: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-content">
            <a href="/" class="brand">fogpub</a>
            <div class="nav-links">
                {% block nav %}
                {% if logged_in %}
                    <form method="post" action="/logout" style="display: inline;">
                        <button type="submit">Log out</button>
                    </form>
                {% else %}
                    <a href="/login">Log in</a>
                    <a href="/signup">Sign up</a>
                {% endif %}
                {% endblock %}
            </div>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
