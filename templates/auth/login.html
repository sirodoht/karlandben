{% extends "layout.html" %}

{% block title %}Sign in - karlandben{% endblock %}

{% block content %}
<div class="hero fade-in" style="padding-top: 4rem;">
    <div class="section-label fade-in-delay-1">Welcome back</div>
    <h1 class="fade-in">Sign in</h1>
    <div class="fog-divider fade-in-delay-1"></div>
</div>

{% if let Some(error) = error %}
<div class="error fade-in-delay-2">{{ error }}</div>
{% endif %}

<form method="post" action="/login" class="fade-in-delay-2">
    <label>Email</label>
    <input type="email" name="email" required autofocus placeholder="you@example.com">
    <button type="submit">Send sign-in code</button>
</form>

<p class="fade-in-delay-3" style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
    We'll send you a 6-digit code to verify your email.
</p>
{% endblock %}
