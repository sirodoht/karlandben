{% extends "layout.html" %}

{% block title %}Sign in - karlandben{% endblock %}

{% block content %}
<div class="hero" style="padding-top: 4rem;">
    <div class="section-label">Welcome back</div>
    <h1>Sign in</h1>
    <div class="fog-divider"></div>
</div>

{% if let Some(error) = error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="/login">
    <label>Email</label>
    <input type="email" name="email" required autofocus placeholder="you@example.com">
    <button type="submit">Send sign-in code</button>
</form>

<p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
    We'll send you a 6-digit code to verify your email.
</p>
{% endblock %}
