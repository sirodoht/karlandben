{% extends "layout.html" %}

{% block title %}Sign up - fogpub{% endblock %}

{% block nav %}{% endblock %}

{% block content %}
<h1>Sign up</h1>

{% if let Some(error) = error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="/signup">
    <label>Email</label>
    <input type="email" name="email" required autofocus>
    <button type="submit">Send signup code</button>
</form>

<p>Already have an account? <a href="/login">Log in</a></p>
{% endblock %}
