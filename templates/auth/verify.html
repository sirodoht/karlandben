{% extends "layout.html" %}

{% block title %}Verify - karlandben{% endblock %}

{% block content %}
<div class="hero" style="padding-top: 4rem;">
    <h1>Enter verification code</h1>
    <div class="fog-divider"></div>
</div>

<p>
    We've sent a 6-digit code to <strong style="color: var(--text-primary);">{{ form_email }}</strong>
</p>

{% if let Some(error) = error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="post" action="/verify">
    <input type="hidden" name="email" value="{{ form_email }}">
    <label>6-digit code</label>
    <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="off" required autofocus>
    <button type="submit">Verify</button>
</form>

<p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
    Didn't receive it? <a href="/login">Request a new code</a>
</p>
{% endblock %}
