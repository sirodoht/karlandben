{% extends "layout.html" %}

{% block title %}fogpub{% endblock %}

{% block content %}
{% if logged_in %}
    {% if let Some(name) = name %}
        <h1>Welcome back, {{ name }}!</h1>
    {% else %}
        <h1>Welcome back!</h1>
    {% endif %}
{% else %}
    <h1>Welcome to fogpub</h1>
    <p style="margin-top: 2rem;">
        <a href="/login" class="button">Sign in</a>
    </p>
{% endif %}
{% endblock %}
